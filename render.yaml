# Render Blueprint – https://render.com/docs/blueprint-spec
services:
  - type: web
    name: minecraft
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
    autoDeploy: true
